<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SB OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap');

:root {
  --bg:         #02010a;
  --glass:      rgba(10,8,30,0.72);
  --glass-b:    rgba(20,15,50,0.85);
  --border:     rgba(130,100,255,0.18);
  --border-h:   rgba(180,140,255,0.38);
  --accent:     #7c3aed;
  --accent2:    #c084fc;
  --accent3:    #38bdf8;
  --text:       rgba(220,215,255,0.9);
  --text-dim:   rgba(180,170,220,0.55);
  --red:        #f87171;
  --yellow:     #fbbf24;
  --green:      #4ade80;
  --shadow:     0 8px 40px rgba(0,0,0,0.7);
  --taskbar-h:  52px;
  --radius:     12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  color: var(--text);
  user-select: none;
  cursor: none;
}

#cursor {
  position: fixed;
  width: 20px; height: 20px;
  border: 2px solid var(--accent2);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%,-50%);
  transition: width 0.15s, height 0.15s, background 0.15s, border-color 0.15s;
  mix-blend-mode: screen;
  box-shadow: 0 0 10px var(--accent), 0 0 25px rgba(124,58,237,0.4);
}
#cursor-dot {
  position: fixed;
  width: 4px; height: 4px;
  background: #fff;
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 6px #fff;
  transition: transform 0.05s;
}
#cursor.clicking {
  width: 14px; height: 14px;
  background: rgba(124,58,237,0.3);
  border-color: #fff;
}

/* ── Aurora background: pure CSS + tiny JS for parallax ── */
#aurora-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  background: #020108;
}

/* Star layer: CSS-only, no JS, hardware-composited */
#aurora-stars {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 12% 8%,  rgba(255,255,255,0.80) 0%, transparent 100%),
    radial-gradient(1px 1px at 28% 19%, rgba(255,255,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 5%,  rgba(255,255,255,0.70) 0%, transparent 100%),
    radial-gradient(1px 1px at 63% 14%, rgba(255,255,255,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 79% 9%,  rgba(255,255,255,0.65) 0%, transparent 100%),
    radial-gradient(1px 1px at 91% 22%, rgba(255,255,255,0.50) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 7%  33%, rgba(200,210,255,0.75) 0%, transparent 100%),
    radial-gradient(1px 1px at 18% 47%, rgba(255,255,255,0.40) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 38%, rgba(255,255,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 52% 42%, rgba(255,255,255,0.45) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 68% 31%, rgba(200,220,255,0.70) 0%, transparent 100%),
    radial-gradient(1px 1px at 83% 45%, rgba(255,255,255,0.40) 0%, transparent 100%),
    radial-gradient(1px 1px at 96% 37%, rgba(255,255,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 4%  58%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 24% 62%, rgba(255,255,255,0.50) 0%, transparent 100%),
    radial-gradient(1px 1px at 41% 55%, rgba(255,255,255,0.60) 0%, transparent 100%),
    radial-gradient(1px 1px at 57% 67%, rgba(255,255,255,0.40) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 74% 58%, rgba(210,200,255,0.65) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 63%, rgba(255,255,255,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 33% 82%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 78%, rgba(255,255,255,0.50) 0%, transparent 100%),
    radial-gradient(1px 1px at 66% 85%, rgba(255,255,255,0.40) 0%, transparent 100%),
    radial-gradient(1px 1px at 82% 79%, rgba(255,255,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 95% 88%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(2px 2px   at 22% 25%, rgba(180,200,255,0.85) 0%, transparent 100%),
    radial-gradient(2px 2px   at 71% 18%, rgba(255,240,220,0.80) 0%, transparent 100%),
    radial-gradient(2px 2px   at 48% 72%, rgba(200,180,255,0.80) 0%, transparent 100%),
    radial-gradient(2px 2px   at 87% 55%, rgba(180,220,255,0.75) 0%, transparent 100%),
    radial-gradient(2px 2px   at 9%  91%, rgba(255,220,200,0.70) 0%, transparent 100%);
}

/* Aurora curtains: three overlapping blobs animated with CSS keyframes.
   Each blob uses transform + opacity only → GPU compositing, zero layout cost. */
.aurora-blob {
  position: absolute;
  border-radius: 50%;
  mix-blend-mode: screen;
  will-change: transform, opacity;
  filter: blur(80px);
  opacity: 0;
  animation-timing-function: ease-in-out;
  animation-iteration-count: infinite;
  animation-direction: alternate;
}

#ab1 {
  width: 110vw; height: 55vh;
  top: -10vh; left: -5vw;
  background: radial-gradient(ellipse at 50% 50%,
    rgba(95,30,180,0.55) 0%,
    rgba(50,10,120,0.25) 55%,
    transparent 80%);
  animation-name: aurora1;
  animation-duration: 18s;
}
#ab2 {
  width: 90vw; height: 60vh;
  top: 5vh; left: 10vw;
  background: radial-gradient(ellipse at 50% 50%,
    rgba(0,200,160,0.40) 0%,
    rgba(0,100,120,0.20) 55%,
    transparent 80%);
  animation-name: aurora2;
  animation-duration: 23s;
}
#ab3 {
  width: 80vw; height: 50vh;
  top: -5vh; left: 20vw;
  background: radial-gradient(ellipse at 50% 50%,
    rgba(60,120,255,0.45) 0%,
    rgba(20,50,180,0.20) 55%,
    transparent 80%);
  animation-name: aurora3;
  animation-duration: 29s;
}
#ab4 {
  width: 70vw; height: 45vh;
  top: 8vh; left: 30vw;
  background: radial-gradient(ellipse at 50% 50%,
    rgba(200,50,180,0.30) 0%,
    rgba(120,20,120,0.15) 55%,
    transparent 80%);
  animation-name: aurora4;
  animation-duration: 35s;
}

@keyframes aurora1 {
  0%   { opacity: 0.55; transform: translateX(0vw)   scaleY(1.00) rotate(-2deg); }
  33%  { opacity: 0.80; transform: translateX(8vw)   scaleY(1.25) rotate(3deg); }
  66%  { opacity: 0.60; transform: translateX(-6vw)  scaleY(0.90) rotate(-5deg); }
  100% { opacity: 0.70; transform: translateX(4vw)   scaleY(1.15) rotate(1deg); }
}
@keyframes aurora2 {
  0%   { opacity: 0.45; transform: translateX(5vw)   scaleY(1.10) rotate(4deg); }
  40%  { opacity: 0.70; transform: translateX(-8vw)  scaleY(0.85) rotate(-3deg); }
  75%  { opacity: 0.55; transform: translateX(12vw)  scaleY(1.30) rotate(6deg); }
  100% { opacity: 0.50; transform: translateX(-3vw)  scaleY(1.00) rotate(-2deg); }
}
@keyframes aurora3 {
  0%   { opacity: 0.50; transform: translateX(-4vw)  scaleY(0.95) rotate(-4deg); }
  30%  { opacity: 0.75; transform: translateX(10vw)  scaleY(1.20) rotate(5deg); }
  70%  { opacity: 0.45; transform: translateX(-7vw)  scaleY(1.05) rotate(-1deg); }
  100% { opacity: 0.65; transform: translateX(2vw)   scaleY(0.88) rotate(3deg); }
}
@keyframes aurora4 {
  0%   { opacity: 0.35; transform: translateX(3vw)   scaleY(1.15) rotate(2deg); }
  45%  { opacity: 0.55; transform: translateX(-10vw) scaleY(0.80) rotate(-6deg); }
  80%  { opacity: 0.40; transform: translateX(7vw)   scaleY(1.25) rotate(4deg); }
  100% { opacity: 0.50; transform: translateX(-2vw)  scaleY(1.00) rotate(-3deg); }
}

/* Shooting stars: pure CSS, each fires once every N seconds */
.shoot {
  position: absolute;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.90), transparent);
  border-radius: 1px;
  opacity: 0;
  will-change: transform, opacity;
}
@keyframes shoot {
  0%   { opacity: 0; transform: translateX(0) translateY(0); }
  5%   { opacity: 1; }
  100% { opacity: 0; transform: translateX(200px) translateY(80px); }
}

/* Vignette */
#aurora-vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 30%,
    transparent 30%,
    rgba(2,1,8,0.55) 75%,
    rgba(2,1,8,0.88) 100%);
  pointer-events: none;
}

/* Desktop */
#desktop {
  position: fixed;
  inset: 0;
  bottom: var(--taskbar-h);
  z-index: 1;
  overflow: hidden;
}

#icon-grid {
  position: absolute;
  top: 16px;
  left: 16px;
  display: flex;
  flex-direction: column;
  flex-wrap: wrap;
  gap: 8px;
  max-height: calc(100vh - var(--taskbar-h) - 32px);
  align-content: flex-start;
}

.desktop-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  width: 80px;
  padding: 8px 4px;
  border-radius: 10px;
  cursor: none;
  transition: background 0.2s, transform 0.15s;
}
.desktop-icon:hover {
  background: rgba(124,58,237,0.18);
  transform: scale(1.06);
}
.desktop-icon:active { transform: scale(0.96); }

.icon-label {
  font-size: 10px;
  color: var(--text);
  text-align: center;
  text-shadow: 0 1px 4px #000, 0 0 10px #000;
  max-width: 76px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.window {
  position: absolute;
  min-width: 300px;
  min-height: 200px;
  background: var(--glass-b);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,0.04) inset;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  backdrop-filter: blur(22px) saturate(1.4);
  -webkit-backdrop-filter: blur(22px) saturate(1.4);
  transform-origin: center center;
  transition: box-shadow 0.2s;
  z-index: 100;
}
.window.focused {
  border-color: var(--border-h);
  box-shadow: var(--shadow), 0 0 30px rgba(124,58,237,0.25), 0 0 0 1px rgba(255,255,255,0.06) inset;
}
.window.opening   { animation: winOpen    0.22s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.window.closing   { animation: winClose   0.16s ease-in forwards; }
.window.minimizing{ animation: winMinimize 0.2s ease-in forwards; }

@keyframes winOpen    { from { opacity:0; transform:scale(0.82) translateY(12px); } to { opacity:1; transform:scale(1) translateY(0); } }
@keyframes winClose   { from { opacity:1; transform:scale(1); }                    to { opacity:0; transform:scale(0.88) translateY(8px); } }
@keyframes winMinimize{ from { opacity:1; transform:scale(1) translateY(0); }       to { opacity:0; transform:scale(0.5) translateY(100px); } }

.win-titlebar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px;
  height: 38px;
  background: rgba(0,0,0,0.25);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  cursor: move;
  position: relative;
}
.win-controls { display: flex; gap: 7px; flex-shrink: 0; }
.wc {
  width: 13px; height: 13px;
  border-radius: 50%;
  cursor: none;
  border: none;
  transition: filter 0.15s, transform 0.12s;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.wc:hover { filter: brightness(1.4); transform: scale(1.15); }
.wc.close    { background: var(--red);    box-shadow: 0 0 6px rgba(248,113,113,0.5); }
.wc.minimize { background: var(--yellow); box-shadow: 0 0 6px rgba(251,191,36,0.5); }
.wc.maximize { background: var(--green);  box-shadow: 0 0 6px rgba(74,222,128,0.5); }

.win-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.05em;
  flex: 1;
  text-align: center;
  pointer-events: none;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.win-content { flex: 1; overflow: hidden; position: relative; }
.win-content iframe { width: 100%; height: 100%; border: none; display: block; background: #000; }

.win-resize {
  position: absolute; bottom: 0; right: 0;
  width: 18px; height: 18px;
  cursor: se-resize; z-index: 10;
}
.win-resize::after {
  content: '';
  position: absolute; bottom: 3px; right: 3px;
  width: 10px; height: 10px;
  border-right: 2px solid var(--border-h);
  border-bottom: 2px solid var(--border-h);
  border-radius: 2px;
}

#taskbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--taskbar-h);
  background: rgba(5,3,18,0.88);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(28px) saturate(1.6);
  -webkit-backdrop-filter: blur(28px) saturate(1.6);
  z-index: 9000;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  box-shadow: 0 -4px 30px rgba(0,0,0,0.5);
}

#taskbar-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 15px;
  color: var(--accent2);
  letter-spacing: 0.12em;
  flex-shrink: 0;
  text-shadow: 0 0 14px var(--accent);
  padding: 6px 10px;
  border-radius: 8px;
  background: rgba(124,58,237,0.12);
  border: 1px solid rgba(124,58,237,0.2);
  cursor: none;
  transition: background 0.2s;
}
#taskbar-logo:hover { background: rgba(124,58,237,0.22); }

#taskbar-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }

#taskbar-apps {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
}
#taskbar-apps::-webkit-scrollbar { display: none; }

.tb-app {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 10px;
  border-radius: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  cursor: none;
  transition: background 0.2s, border-color 0.2s;
  flex-shrink: 0;
  max-width: 160px;
}
.tb-app:hover  { background: rgba(124,58,237,0.18); border-color: var(--border-h); }
.tb-app.active { background: rgba(124,58,237,0.25); border-color: rgba(192,132,252,0.4); }
.tb-app-name {
  font-size: 10px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: 0.03em;
}

#taskbar-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
#tb-clock { font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; text-align: right; line-height: 1.4; }
#tb-clock .time { color: var(--text); font-size: 13px; font-weight: 500; }

#start-menu {
  position: fixed;
  bottom: calc(var(--taskbar-h) + 10px);
  left: 16px;
  width: 420px;
  max-height: 600px;
  background: var(--glass-b);
  border: 1px solid var(--border-h);
  border-radius: 16px;
  backdrop-filter: blur(32px) saturate(1.8);
  -webkit-backdrop-filter: blur(32px) saturate(1.8);
  box-shadow: var(--shadow), 0 0 40px rgba(124,58,237,0.2);
  z-index: 9500;
  display: none;
  flex-direction: column;
  overflow: hidden;
  transform-origin: bottom left;
}
#start-menu.open {
  display: flex;
  animation: menuOpen 0.22s cubic-bezier(0.34,1.4,0.64,1) forwards;
}
@keyframes menuOpen {
  from { opacity:0; transform:scale(0.9) translateY(14px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

#sm-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
#sm-title  { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: var(--accent2); letter-spacing: 0.1em; text-shadow: 0 0 20px var(--accent); }
#sm-subtitle { font-size: 10px; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.1em; }

#sm-search-wrap { padding: 12px 20px; border-bottom: 1px solid var(--border); }
#sm-search {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
  cursor: text;
}
#sm-search:focus { border-color: var(--border-h); background: rgba(255,255,255,0.08); }
#sm-search::placeholder { color: var(--text-dim); }

#sm-apps {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) transparent;
}

.sm-app-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  cursor: none;
  transition: background 0.18s, border-color 0.18s, transform 0.12s;
}
.sm-app-btn:hover  { background: rgba(124,58,237,0.2); border-color: var(--border-h); transform: scale(1.02); }
.sm-app-btn:active { transform: scale(0.97); }
.sm-app-name { font-size: 11px; color: var(--text); letter-spacing: 0.03em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#sm-footer { display: flex; align-items: center; gap: 10px; padding: 12px 20px; border-top: 1px solid var(--border); }
.sm-footer-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  cursor: none; font-size: 11px; color: var(--text-dim);
  transition: background 0.18s, color 0.18s;
}
.sm-footer-btn:hover { background: rgba(248,113,113,0.15); color: var(--red); border-color: rgba(248,113,113,0.3); }

#add-app-modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99000;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#add-app-modal.open { display: flex; }
#add-app-panel {
  background: var(--glass-b);
  border: 1px solid var(--border-h);
  border-radius: 16px;
  padding: 28px;
  width: 380px;
  box-shadow: var(--shadow), 0 0 40px rgba(124,58,237,0.3);
  animation: winOpen 0.2s ease forwards;
}
#add-app-panel h3 { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--accent2); margin-bottom: 20px; letter-spacing: 0.06em; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 0.08em; }
.modal-field input, .modal-field select {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
  cursor: text;
}
.modal-field input:focus { border-color: var(--border-h); }
.modal-btns { display: flex; gap: 10px; margin-top: 20px; }
.modal-btn {
  flex: 1; padding: 10px; border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; cursor: none;
  border: 1px solid var(--border);
  transition: background 0.2s;
  letter-spacing: 0.05em;
}
.modal-btn.primary { background: rgba(124,58,237,0.4); color: var(--text); border-color: var(--accent); }
.modal-btn.primary:hover { background: rgba(124,58,237,0.6); }
.modal-btn.cancel  { background: rgba(255,255,255,0.04); color: var(--text-dim); }
.modal-btn.cancel:hover { background: rgba(255,255,255,0.08); }

#notif-area { position: fixed; top: 16px; right: 16px; z-index: 99900; display: flex; flex-direction: column; gap: 8px; }
.notif {
  background: var(--glass-b);
  border: 1px solid var(--border-h);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 12px;
  color: var(--text);
  box-shadow: var(--shadow);
  backdrop-filter: blur(20px);
  animation: notifIn 0.25s ease, notifOut 0.3s ease 2.7s forwards;
  max-width: 300px;
  letter-spacing: 0.03em;
}
@keyframes notifIn  { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
@keyframes notifOut { from { opacity:1; transform:translateX(0); }    to { opacity:0; transform:translateX(30px); } }

::-webkit-scrollbar       { width: 6px; }

::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
</style>
</head>
<body>

    </div>

</div>

  <div id="sm-header">

  </div>

<div id="notif-area"></div>

<script>
// ── Shooting stars: spawned via JS, animated via CSS ──────────────────
(function() {
  const bg = document.getElementById('aurora-bg');
  function spawnShoot() {
    const s = document.createElement('div');
    s.className = 'shoot';
    const startX = Math.random() * 80;
    const startY = Math.random() * 50;
    const len    = 60 + Math.random() * 120;
    const dur    = 0.8 + Math.random() * 0.8;
    const delay  = Math.random() * 8;
    s.style.cssText = `left:${startX}vw;top:${startY}vh;width:${len}px;
      animation:shoot ${dur}s ${delay}s ease-out forwards;`;
    bg.appendChild(s);
    setTimeout(() => s.remove(), (dur + delay + 0.2) * 1000);
  }
  for (let i = 0; i < 5; i++) spawnShoot();
  setInterval(spawnShoot, 2800);
})();

// ── Cursor ─────────────────────────────────────────────────────────────
const cursor    = document.getElementById('cursor');
const cursorDot = document.getElementById('cursor-dot');
let mx = 0, my = 0, cx2 = 0, cy2 = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
document.addEventListener('mouseup',   () => cursor.classList.remove('clicking'));
function animCursor() {
  cx2 += (mx - cx2) * 0.18;
  cy2 += (my - cy2) * 0.18;
  cursor.style.left = cx2 + 'px';
  cursor.style.top  = cy2 + 'px';
  cursorDot.style.left = mx + 'px';
  cursorDot.style.top  = my + 'px';
  requestAnimationFrame(animCursor);
}
animCursor();

// ── App registry ───────────────────────────────────────────────────────
const APPS = [
  { id:'fern',      name:'Fern',          shape:'fern',      color:'#10b981', color2:'#34d399', type:'embed',  url:'https://s3.amazonaws.com/mathvc/index.html',                                                             w:900, h:620 },
  { id:'lucide',    name:'Lucide Browser',shape:'browser',   color:'#f59e0b', color2:'#fcd34d', type:'embed',  url:'https://cdn.jsdelivr.net/gh/lucideproxy/svg@latest/logo.svg#/',                                                                                     w:700, h:500 },
  { id:'lumin',     name:'Lumin',         shape:'gamepad',   color:'#8b5cf6', color2:'#c084fc', type:'inline', code:`<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LuminSDK</title><style>body{margin:0;background:#0a0a0a;}</style></head><body><div id="games"></div><script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"><\/script><script>Lumin.init({container:'#games',theme:'dark',columns:10,rows:4,gamesPerPage:40});<\/script></body></html>`, w:1100, h:660 },
  { id:'sg',        name:'Suicide Guy',   shape:'gamepad',   color:'#ef4444', color2:'#f87171', type:'fetch',  url:'https://cdn.jsdelivr.net/gh/strawberrypoptartts/strawberrypoptartts.github.io/g/sg.html',               w:900, h:620 },
  { id:'blackhole', name:'Blackhole Sim', shape:'blackhole', color:'#1e40af', color2:'#60a5fa', type:'fetch',  url:'https://cdn.jsdelivr.net/gh/simulation65/simulation65.github.io/blackhole/blackhole.html',              w:920, h:640 },
  { id:'particles', name:'Particles',     shape:'particles', color:'#6366f1', color2:'#a5b4fc', type:'fetch',  url:'https://cdn.jsdelivr.net/gh/simulation65/simulation65.github.io/index.html',                            w:880, h:620 },
  { id:'cube',      name:'Cube',          shape:'cube',      color:'#0ea5e9', color2:'#7dd3fc', type:'fetch',  url:'https://cdn.jsdelivr.net/gh/simulation65/simulation65.github.io/cube/index.html',                       w:780, h:580 },
  { id:'galaxy',    name:'Galaxy Sim',    shape:'galaxy',    color:'#7c3aed', color2:'#c084fc', type:'fetch',  url:'https://cdn.jsdelivr.net/gh/simulation65/simulation65.github.io/ga/laxy.html',                          w:900, h:640 },
];

// ── Window manager ─────────────────────────────────────────────────────
let zTop = 200;
const openWindows = {};

function notify(msg) {
  const n = document.createElement('div');
  n.className = 'notif';
  n.textContent = msg;
  document.getElementById('notif-area').appendChild(n);
  setTimeout(() => n.remove(), 3100);
}

async function openApp(app) {
  if (openWindows[app.id]) {
    const w = openWindows[app.id];
    if (w.minimized) {
      w.el.style.display = 'flex';
      w.minimized = false;
      w.el.classList.add('opening');
      setTimeout(() => w.el.classList.remove('opening'), 300);
      focusWindow(app.id);
      updateTaskbar();
    } else { focusWindow(app.id); }
    return;
  }
  const win = document.createElement('div');
  win.className = 'window opening';
  const desktop = document.getElementById('desktop');
  const dw = desktop.clientWidth, dh = desktop.clientHeight;
  const ww = Math.min(app.w || 800, dw - 40);
  const wh = Math.min(app.h || 560, dh - 40);
  const offset = Object.keys(openWindows).length * 28;
  const wx = Math.max(20, Math.min((dw - ww) / 2 + offset, dw - ww - 20));
  const wy = Math.max(20, Math.min((dh - wh) / 2 + offset, dh - wh - 20));
  win.style.cssText = `left:${wx}px;top:${wy}px;width:${ww}px;height:${wh}px;z-index:${++zTop}`;

  const tb = document.createElement('div');
  tb.className = 'win-titlebar';
  const miniCanvas = makeIconCanvas(app, 18);
  miniCanvas.style.cssText = 'border-radius:4px;display:block;flex-shrink:0;';
  tb.innerHTML = `<div class="win-controls"><div class="wc close" title="Close"></div><div class="wc minimize" title="Minimize"></div><div class="wc maximize" title="Maximize"></div></div>`;
  const titleSpan = document.createElement('div');
  titleSpan.className = 'win-title';
  titleSpan.textContent = app.name;
  tb.appendChild(miniCanvas);
  tb.appendChild(titleSpan);
  win.appendChild(tb);

  const content = document.createElement('div');
  content.className = 'win-content';
  win.appendChild(content);
  const rh = document.createElement('div');
  rh.className = 'win-resize';
  win.appendChild(rh);

  desktop.appendChild(win);
  openWindows[app.id] = { el: win, app, minimized: false };
  setTimeout(() => win.classList.remove('opening'), 300);
  await loadAppContent(app, content);

  tb.querySelector('.close').addEventListener('click',    () => closeWindow(app.id));
  tb.querySelector('.minimize').addEventListener('click', () => minimizeWindow(app.id));
  let maximized = false, savedRect = null;
  tb.querySelector('.maximize').addEventListener('click', () => {
    if (!maximized) {
      savedRect = { left:win.style.left, top:win.style.top, width:win.style.width, height:win.style.height };
      win.style.left='0'; win.style.top='0'; win.style.width=dw+'px'; win.style.height=dh+'px'; maximized=true;
    } else { Object.assign(win.style, savedRect); maximized=false; }
  });
  makeDraggable(win, tb);
  makeResizable(win, rh);
  win.addEventListener('mousedown', () => focusWindow(app.id));
  focusWindow(app.id);
  updateTaskbar();
  notify(`Opened ${app.name}`);
}

const POPUP_BLOCKER = `<script>(function(){window.open=function(){return null;};document.addEventListener('click',function(e){var el=e.target.closest('a');if(el&&(el.target==='_blank'||el.target==='_top'||el.target==='_parent'))el.target='_self';},true);document.addEventListener('submit',function(e){var f=e.target;if(f&&(f.target==='_blank'||f.target==='_top'||f.target==='_parent'))f.target='_self';},true);})();<\/script>`;
function injectPopupBlocker(html) {
  if (html.includes('<head>')) return html.replace('<head>','<head>'+POPUP_BLOCKER);
  if (html.includes('<HEAD>')) return html.replace('<HEAD>','<HEAD>'+POPUP_BLOCKER);
  return POPUP_BLOCKER + html;
}
const SANDBOX = 'allow-scripts allow-same-origin allow-forms allow-pointer-lock';

async function loadAppContent(app, container) {
  if (app.type === 'embed') {
    const iframe = document.createElement('iframe');
    iframe.src = app.url;
    iframe.setAttribute('allowfullscreen','');
    iframe.setAttribute('sandbox', SANDBOX);
    container.appendChild(iframe);
  } else if (app.type === 'inline') {
    const iframe = document.createElement('iframe');
    iframe.setAttribute('sandbox', SANDBOX);
    container.appendChild(iframe);
    const blocked = injectPopupBlocker(app.code);
    iframe.contentDocument.open(); iframe.contentDocument.write(blocked); iframe.contentDocument.close();
  } else if (app.type === 'fetch') {
    container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:rgba(180,170,220,0.6);font-size:13px;letter-spacing:0.1em;">Loading ${app.name}...</div>`;
    try {
      const res  = await fetch(app.url);
      const html = await res.text();
      container.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.setAttribute('sandbox', SANDBOX);
      container.appendChild(iframe);
      iframe.contentDocument.open(); iframe.contentDocument.write(injectPopupBlocker(html)); iframe.contentDocument.close();
    } catch(e) {
      container.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.src = app.url; iframe.setAttribute('sandbox', SANDBOX);
      container.appendChild(iframe);
    }
  }
}

function closeWindow(id) {
  const w = openWindows[id]; if (!w) return;
  w.el.classList.add('closing');
  setTimeout(() => { w.el.remove(); delete openWindows[id]; updateTaskbar(); }, 200);
}
function minimizeWindow(id) {
  const w = openWindows[id]; if (!w) return;
  w.el.classList.add('minimizing');
  setTimeout(() => { w.el.style.display='none'; w.el.classList.remove('minimizing'); w.minimized=true; updateTaskbar(); }, 220);
}
function focusWindow(id) {
  Object.values(openWindows).forEach(w => w.el.classList.remove('focused'));
  if (openWindows[id]) { openWindows[id].el.classList.add('focused'); openWindows[id].el.style.zIndex=++zTop; }
  updateTaskbar();
}

// ── Drag / resize ──────────────────────────────────────────────────────
function makeDraggable(win, handle) {
  let startX, startY, startL, startT, dragging=false;
  handle.addEventListener('mousedown', e => {
    if (e.target.classList.contains('wc')) return;
    dragging=true; startX=e.clientX; startY=e.clientY;
    startL=parseInt(win.style.left)||0; startT=parseInt(win.style.top)||0; e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const desktop=document.getElementById('desktop'), dw=desktop.clientWidth, dh=desktop.clientHeight;
    win.style.left = Math.max(-parseInt(win.style.width)/2, Math.min(startL+(e.clientX-startX), dw-60))+'px';
    win.style.top  = Math.max(0, Math.min(startT+(e.clientY-startY), dh-40))+'px';
  });
  document.addEventListener('mouseup', () => { dragging=false; });
}
function makeResizable(win, handle) {
  let startX, startY, startW, startH, resizing=false;
  handle.addEventListener('mousedown', e => { resizing=true; startX=e.clientX; startY=e.clientY; startW=win.offsetWidth; startH=win.offsetHeight; e.preventDefault(); e.stopPropagation(); });
  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    win.style.width  = Math.max(320, startW+(e.clientX-startX))+'px';
    win.style.height = Math.max(200, startH+(e.clientY-startY))+'px';
  });
  document.addEventListener('mouseup', () => { resizing=false; });
}

// ── Taskbar ────────────────────────────────────────────────────────────
function updateTaskbar() {
  const container = document.getElementById('taskbar-apps');
  container.innerHTML = '';
  Object.entries(openWindows).forEach(([id, w]) => {
    const btn = document.createElement('div');
    btn.className = 'tb-app'+(!w.minimized && w.el.classList.contains('focused') ? ' active' : '');
    const ic = makeIconCanvas(w.app, 18);
    ic.style.cssText = 'border-radius:3px;display:block;flex-shrink:0;';
    const nameEl = document.createElement('span');
    nameEl.className = 'tb-app-name';
    nameEl.textContent = w.app.name;
    btn.appendChild(ic); btn.appendChild(nameEl);
    btn.addEventListener('click', () => {
      if (w.minimized) { w.el.style.display='flex'; w.el.classList.add('opening'); setTimeout(()=>w.el.classList.remove('opening'),300); w.minimized=false; focusWindow(id); updateTaskbar(); }
      else if (w.el.classList.contains('focused')) { minimizeWindow(id); }
      else { focusWindow(id); updateTaskbar(); }
    });
    container.appendChild(btn);
  });
}

// ── Clock ──────────────────────────────────────────────────────────────
function updateClock() {
  const now=new Date(), h=String(now.getHours()).padStart(2,'0'), m=String(now.getMinutes()).padStart(2,'0');
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clock-time').textContent=`${h}:${m}`;
  document.getElementById('clock-date').textContent=`${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
}
updateClock(); setInterval(updateClock, 10000);

// ── Icon renderer ──────────────────────────────────────────────────────
function drawAppIcon(canvas, app) {
  const S=canvas.width, ctx=canvas.getContext('2d'), cx=S/2, cy=S/2;
  const c1=app.color||'#7c3aed', c2=app.color2||'#c084fc';
  ctx.clearRect(0,0,S,S);
  const rr=S*0.22;
  ctx.save();
  ctx.beginPath(); roundRect(ctx,0,0,S,S,rr);
  const bg=ctx.createLinearGradient(0,0,S,S);
  bg.addColorStop(0,hexAlpha(c1,0.88)); bg.addColorStop(1,hexAlpha(c2,0.58));
  ctx.fillStyle=bg; ctx.fill();
  const gloss=ctx.createLinearGradient(0,0,0,S*0.52);
  gloss.addColorStop(0,'rgba(255,255,255,0.17)'); gloss.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=gloss; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.13)'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
  ctx.save(); ctx.shadowBlur=S*0.11; ctx.shadowColor=hexAlpha(c2,0.65);
  drawShape(ctx,app.shape||'default',cx,cy,S,c1,c2,app); ctx.restore();
  ctx.save();
  const innerSh=ctx.createLinearGradient(0,S*0.68,0,S);
  innerSh.addColorStop(0,'rgba(0,0,0,0)'); innerSh.addColorStop(1,'rgba(0,0,0,0.22)');
  ctx.beginPath(); roundRect(ctx,0,0,S,S,rr); ctx.fillStyle=innerSh; ctx.fill(); ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

function drawShape(ctx,shape,cx,cy,S,c1,c2,app){
  const u=S*0.1;
  ctx.lineJoin='round'; ctx.lineCap='round';
  switch(shape){
    case 'fern':{
      ctx.strokeStyle='#fff'; ctx.lineWidth=u*0.52;
      ctx.beginPath(); ctx.moveTo(cx,cy+u*2.8); ctx.quadraticCurveTo(cx-u*0.5,cy,cx-u*0.3,cy-u*2.5); ctx.stroke();
      for(let i=0;i<5;i++){const t=i/4,sy=cy+u*2.1-t*u*4.4,sx=cx-u*0.18-t*u*0.18,side=i%2===0?1:-1,len=u*(1.55-t*0.65);
        ctx.globalAlpha=0.62+t*0.38; ctx.beginPath(); ctx.moveTo(sx,sy);
        ctx.quadraticCurveTo(sx+side*len*0.5,sy-u*0.75,sx+side*len,sy-u*0.38); ctx.stroke();}
      ctx.globalAlpha=1; break;
    }
    case 'browser':{
      ctx.strokeStyle='#fff'; ctx.lineWidth=u*0.48;
      ctx.beginPath(); roundRect(ctx,cx-u*3,cy-u*3,u*6,u*6,u*0.48); ctx.stroke();
      ctx.globalAlpha=0.45; ctx.beginPath(); ctx.moveTo(cx-u*2.1,cy-u*1.48); ctx.lineTo(cx+u*2.1,cy-u*1.48); ctx.stroke();
      ctx.globalAlpha=1;
      for(let i=-1;i<=1;i++){ctx.beginPath();ctx.arc(cx+i*u*0.65,cy-u*2.25,u*0.20,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();}
      ctx.globalAlpha=0.38;
      for(let row=0;row<3;row++){ctx.beginPath();ctx.moveTo(cx-u*1.9,cy-u*0.35+row*u*0.85);ctx.lineTo(cx+u*(row===1?1.1:1.75),cy-u*0.35+row*u*0.85);ctx.stroke();}
      ctx.globalAlpha=1; break;
    }
    case 'gamepad':{
      ctx.strokeStyle='#fff'; ctx.lineWidth=u*0.40;
      ctx.beginPath(); ctx.ellipse(cx,cy+u*0.28,u*3.1,u*2.1,0,0,Math.PI*2);
      ctx.globalAlpha=0.20; ctx.fillStyle='#fff'; ctx.fill(); ctx.globalAlpha=1; ctx.stroke();
      for(let a=0;a<4;a++){ctx.beginPath();ctx.moveTo(cx-u*1.75,cy);ctx.lineTo(cx-u*1.75+Math.cos(a*Math.PI/2)*u*0.65,cy+Math.sin(a*Math.PI/2)*u*0.65);ctx.lineWidth=u*0.50;ctx.stroke();}
      [[-u*0.38,-u*0.75],[u*0.75,0],[0,u*0.75],[-u*0.75,0]].forEach(([bx,by])=>{ctx.beginPath();ctx.arc(cx+u*1.75+bx,cy+by,u*0.30,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();});
      break;
    }
    case 'figure':{
      ctx.strokeStyle='#fff'; ctx.lineWidth=u*0.52; ctx.fillStyle='#fff'; ctx.globalAlpha=0.90;
      ctx.beginPath(); ctx.arc(cx+u*0.5,cy-u*2.15,u*0.70,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx+u*0.4,cy-u*1.38); ctx.lineTo(cx-u*0.2,cy+u*0.78); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+u*0.3,cy-u*0.38); ctx.lineTo(cx+u*1.55,cy-u*1.18);
      ctx.moveTo(cx+u*0.1,cy+u*0.1); ctx.lineTo(cx-u*1.38,cy+u*0.40); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-u*0.2,cy+u*0.78); ctx.lineTo(cx+u*1.18,cy+u*2.45);
      ctx.moveTo(cx-u*0.1,cy+u*0.78); ctx.lineTo(cx-u*1.08,cy+u*2.18); ctx.stroke();
      ctx.globalAlpha=1; break;
    }
    case 'blackhole':{
      const sh=ctx.createRadialGradient(cx,cy,0,cx,cy,u*2.4);
      sh.addColorStop(0,'rgba(0,0,0,1)'); sh.addColorStop(0.68,'rgba(0,0,0,0.88)'); sh.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(cx,cy,u*2.4,0,Math.PI*2); ctx.fillStyle=sh; ctx.fill();
      ctx.beginPath(); ctx.arc(cx,cy,u*2.55,0,Math.PI*2); ctx.strokeStyle='rgba(255,218,95,0.88)'; ctx.lineWidth=u*0.26;
      ctx.shadowBlur=6; ctx.shadowColor='rgba(255,200,80,0.8)'; ctx.stroke(); ctx.shadowBlur=0;
      for(let i=0;i<3;i++){const r=u*(2.9+i*0.58),al=0.48-i*0.13;
        ctx.beginPath(); ctx.ellipse(cx,cy,r,r*0.27,0,0.12,Math.PI-0.12); ctx.strokeStyle=`rgba(255,${145-i*28},${35-i*8},${al})`; ctx.lineWidth=u*(0.52-i*0.09); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(cx,cy,r,r*0.27,0,Math.PI+0.12,Math.PI*2-0.12); ctx.strokeStyle=`rgba(195,${75-i*18},195,${al*0.38})`; ctx.lineWidth=u*(0.28-i*0.04); ctx.stroke();}
      break;
    }
    case 'particles':{
      const pts=[[cx-u*2,cy-u*1.5],[cx+u*1.8,cy-u*2],[cx-u*0.5,cy+u*0.5],[cx+u*2.2,cy+u*0.8],[cx-u*1.5,cy+u*2],[cx+u*0.2,cy-u*0.2]];
      ctx.strokeStyle='rgba(255,255,255,0.23)'; ctx.lineWidth=u*0.23;
      [[0,2],[1,3],[2,4],[3,5],[0,5],[1,2]].forEach(([a,b])=>{ctx.beginPath();ctx.moveTo(pts[a][0],pts[a][1]);ctx.lineTo(pts[b][0],pts[b][1]);ctx.stroke();});
      pts.forEach(([px,py],i)=>{ctx.beginPath();ctx.arc(px,py,u*(i<2?0.52:0.36),0,Math.PI*2);ctx.fillStyle='#fff';ctx.globalAlpha=0.68+i*0.05;ctx.fill();});
      ctx.globalAlpha=1; break;
    }
    case 'cube':{
      ctx.strokeStyle='#fff'; ctx.lineWidth=u*0.48;
      const h=u*2.1, hh=h*0.54;
      ctx.beginPath(); ctx.moveTo(cx,cy-u*2.1); ctx.lineTo(cx+h,cy-u*2.1+hh); ctx.lineTo(cx,cy-u*2.1+hh*2); ctx.lineTo(cx-h,cy-u*2.1+hh); ctx.closePath();
      ctx.fillStyle='rgba(255,255,255,0.11)'; ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx-h,cy-u*2.1+hh); ctx.lineTo(cx,cy-u*2.1+hh*2); ctx.lineTo(cx,cy+u*2.1); ctx.lineTo(cx-h,cy+u*2.1-hh); ctx.closePath();
      ctx.fillStyle='rgba(255,255,255,0.055)'; ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+h,cy-u*2.1+hh); ctx.lineTo(cx,cy-u*2.1+hh*2); ctx.lineTo(cx,cy+u*2.1); ctx.lineTo(cx+h,cy+u*2.1-hh); ctx.closePath();
      ctx.fillStyle='rgba(255,255,255,0.085)'; ctx.fill(); ctx.stroke();
      break;
    }
    case 'galaxy':{
      ctx.strokeStyle='#fff'; ctx.lineWidth=u*0.33;
      for(let arm=0;arm<2;arm++){const startA=arm*Math.PI; ctx.beginPath();
        for(let i=0;i<=64;i++){const t=i/64,r=u*0.28+t*u*3.1,a=startA+t*Math.PI*2.75,px=cx+Math.cos(a)*r,py=cy+Math.sin(a)*r*0.44;
          ctx.globalAlpha=t*0.88; i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);} ctx.stroke();}
      ctx.globalAlpha=1;
      const core=ctx.createRadialGradient(cx,cy,0,cx,cy,u*1.1);
      core.addColorStop(0,'rgba(255,242,205,0.96)'); core.addColorStop(0.38,'rgba(255,200,115,0.42)'); core.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=core; ctx.beginPath(); ctx.arc(cx,cy,u*1.1,0,Math.PI*2); ctx.fill();
      break;
    }
    default:{
      const letters=((app.letters||app.name||'?').slice(0,2)).toUpperCase();
      ctx.fillStyle='#fff'; ctx.font=`500 ${S*0.36}px "JetBrains Mono",monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.globalAlpha=0.92;
      ctx.fillText(letters,cx,cy+S*0.02); ctx.globalAlpha=1; break;
    }
  }
}

function makeIconCanvas(app,size){
  size=size||48; const c=document.createElement('canvas'); c.width=c.height=size; drawAppIcon(c,app); return c;
}

// ── Desktop icons ──────────────────────────────────────────────────────
function renderDesktopIcons(){
  const grid=document.getElementById('icon-grid'); grid.innerHTML='';
  APPS.forEach(app=>{
    const ic=document.createElement('div'); ic.className='desktop-icon';
    const iconCanvas=makeIconCanvas(app,56);
    iconCanvas.style.cssText=`border-radius:14px;display:block;box-shadow:0 4px 18px ${hexAlpha(app.color,0.42)},inset 0 1px 0 rgba(255,255,255,0.11);`;
    const label=document.createElement('div'); label.className='icon-label'; label.textContent=app.name;
    ic.appendChild(iconCanvas); ic.appendChild(label);
    ic.addEventListener('dblclick',()=>openApp(app)); grid.appendChild(ic);
  });
}

// ── Start menu ─────────────────────────────────────────────────────────
let menuOpen=false;
const startMenu=document.getElementById('start-menu'), smApps=document.getElementById('sm-apps'), smSearch=document.getElementById('sm-search');
function renderStartMenu(filter){
  filter=filter||''; smApps.innerHTML='';
  APPS.filter(a=>a.name.toLowerCase().includes(filter.toLowerCase())).forEach(app=>{
    const btn=document.createElement('div'); btn.className='sm-app-btn';
    const ic=makeIconCanvas(app,24); ic.style.cssText='border-radius:6px;display:block;flex-shrink:0;';
    const nameEl=document.createElement('span'); nameEl.className='sm-app-name'; nameEl.textContent=app.name;
    btn.appendChild(ic); btn.appendChild(nameEl);
    btn.addEventListener('click',()=>{openApp(app);toggleMenu(false);}); smApps.appendChild(btn);
  });
}
function toggleMenu(force){
  menuOpen=force!==undefined?force:!menuOpen;
  if(menuOpen){startMenu.classList.add('open');smSearch.value='';renderStartMenu();setTimeout(()=>smSearch.focus(),100);}
  else{startMenu.classList.remove('open');}
}
smSearch.addEventListener('input',e=>renderStartMenu(e.target.value));
document.addEventListener('keydown',e=>{if(e.key==='Control'){e.preventDefault();toggleMenu();}if(e.key==='Escape'&&menuOpen)toggleMenu(false);});
document.addEventListener('click',e=>{if(menuOpen&&!startMenu.contains(e.target))toggleMenu(false);});
document.getElementById('taskbar-logo').addEventListener('click',()=>toggleMenu());

// ── Add App modal ──────────────────────────────────────────────────────
const modal=document.getElementById('add-app-modal');
document.getElementById('btn-add-app').addEventListener('click',()=>{toggleMenu(false);modal.classList.add('open');});
document.getElementById('modal-cancel').addEventListener('click',()=>modal.classList.remove('open'));
modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open');});
document.getElementById('modal-add').addEventListener('click',()=>{
  const name=document.getElementById('new-app-name').value.trim();
  const url=document.getElementById('new-app-url').value.trim();
  const icon=document.getElementById('new-app-icon').value.trim()||'??';
  const color=document.getElementById('new-app-color').value;
  if(!name||!url){notify('Please fill in name and URL');return;}
  APPS.push({id:'custom_'+Date.now(),name,letters:icon,color,color2:color,shape:'default',type:'embed',url,w:900,h:620});
  renderDesktopIcons(); modal.classList.remove('open'); notify(`Added "${name}" to desktop`);
});

// ── Power controls ─────────────────────────────────────────────────────
document.getElementById('btn-reboot').addEventListener('click',()=>{toggleMenu(false);notify('Rebooting SB OS...');setTimeout(()=>location.reload(),1200);});
document.getElementById('btn-shutdown').addEventListener('click',()=>{
  toggleMenu(false); document.body.style.transition='opacity 1s'; document.body.style.opacity='0';
  setTimeout(()=>{document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:rgba(100,80,180,0.5);font-family:monospace;font-size:14px;letter-spacing:0.15em;">SB OS — powered off</div>';document.body.style.opacity='1';},1100);
});

// ── Init ───────────────────────────────────────────────────────────────
renderDesktopIcons();
renderStartMenu();
notify('Welcome to SB OS  ·  Press CTRL for launcher');
</script>
</body>
