<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Editor</title>
<style>
  :root {
    --bg: #0d0d1a;
    --bg2: #11112b;
    --bg3: #16163a;
    --bg4: #1e1e4a;
    --border: #2a2a5a;
    --text: #e0deff;
    --text-muted: #7070aa;
    --text-dim: #44446a;
    --accent: #7b5ea7;
    --accent-bright: #a78bfa;
    --pink: #f472b6;
    --cyan: #22d3ee;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --gutter: #0d0d1a;
    --line-num: #3a3a6a;
    --scrollbar: #2a2a5a;
    --scrollbar-hover: #5a3a8a;
    --cursor: #a78bfa;
    --grad-start: #7b5ea7;
    --grad-end: #22d3ee;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; }

  #app { display: flex; flex-direction: column; height: 100vh; }
  #main { display: flex; flex: 1; overflow: hidden; }

  #activity {
    width: 48px;
    background: #0a0a18;
    display: flex; flex-direction: column; align-items: center;
    padding-top: 10px; gap: 4px; flex-shrink: 0;
    border-right: 1px solid var(--border);
  }
  .act-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); cursor: pointer; border-radius: 4px;
    transition: color .15s;
  }
  .act-btn:hover { color: var(--accent-bright); }
  .act-btn.active { color: var(--accent-bright); border-left: 2px solid var(--accent-bright); border-radius: 0; }

  #editor-pane {
    display: flex; flex-direction: column;
    min-width: 180px; max-width: 75vw;
    background: var(--bg); position: relative; flex-shrink: 0;
  }

  #editor-tabs {
    height: 36px; background: var(--bg2);
    display: flex; align-items: flex-end;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
  }
  #editor-tabs::-webkit-scrollbar { display: none; }

  .tab {
    height: 36px; padding: 0 16px;
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; font-size: 12px; color: var(--text-muted);
    background: var(--bg3); border-right: 1px solid var(--border);
    white-space: nowrap; transition: background .1s; user-select: none;
  }
  .tab.active {
    background: var(--bg);
    color: var(--text);
    border-top: 1px solid transparent;
    border-image: linear-gradient(90deg, var(--accent-bright), var(--pink)) 1;
  }
  .tab .close { opacity: 0; font-size: 16px; line-height: 1; color: var(--text-muted); padding: 2px; border-radius: 2px; }
  .tab:hover .close { opacity: 1; }
  .tab .close:hover { background: var(--bg4); color: white; }

  #find-bar {
    display: none; position: absolute; top: 36px; right: 0; z-index: 100;
    background: var(--bg2); border: 1px solid var(--border); border-top: none;
    padding: 6px 8px; gap: 6px; align-items: center; width: 380px;
    box-shadow: 0 8px 32px #00000088;
  }
  #find-bar.visible { display: flex; }
  #find-input {
    background: var(--bg4); border: 1px solid var(--border); color: var(--text);
    padding: 3px 6px; font-size: 12px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    width: 160px; outline: none; border-radius: 2px;
  }
  #find-input:focus { border-color: var(--accent-bright); box-shadow: 0 0 0 1px var(--accent-bright)44; }
  .find-opt {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid transparent; border-radius: 3px;
    cursor: pointer; color: var(--text-muted); font-size: 11px; font-weight: bold; user-select: none;
  }
  .find-opt:hover { background: var(--bg4); color: var(--text); }
  .find-opt.active { border-color: var(--accent-bright); background: #7b5ea722; color: var(--accent-bright); }
  #find-count { font-size: 11px; color: var(--text-muted); min-width: 60px; white-space: nowrap; }
  .find-nav {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-muted); border-radius: 3px; font-size: 14px;
  }
  .find-nav:hover { background: var(--bg4); color: var(--accent-bright); }
  #find-close { cursor: pointer; color: var(--text-muted); font-size: 18px; padding: 2px 4px; border-radius: 3px; line-height: 1; }
  #find-close:hover { color: var(--pink); }

  #editor-body { display: flex; flex: 1; overflow: hidden; position: relative; }

  #line-numbers {
    width: 52px; background: var(--gutter);
    overflow: hidden; user-select: none; flex-shrink: 0;
    position: relative; border-right: 1px solid var(--border);
  }
  #line-numbers-inner { position: absolute; top: 0; left: 0; right: 0; padding-top: 8px; }
  .ln {
    display: block; text-align: right; padding-right: 14px;
    font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
    font-size: 13px; color: var(--line-num); line-height: 1.5; height: 19.5px;
    transition: color .1s;
  }

  #code-scroll { flex: 1; overflow: auto; position: relative; }
  #code-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
  #code-scroll::-webkit-scrollbar-track { background: var(--bg2); }
  #code-scroll::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, var(--accent) 0%, var(--pink) 100%);
    border-radius: 5px; border: 2px solid var(--bg2);
  }
  #code-scroll::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, var(--accent-bright) 0%, var(--pink) 100%); }
  #code-scroll::-webkit-scrollbar-corner { background: var(--bg2); }

  #code-editor {
    min-height: 100%; min-width: 100%;
    padding: 8px 8px 8px 4px;
    font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
    font-size: 13px; line-height: 1.5;
    color: var(--text); background: transparent;
    border: none; outline: none; resize: none;
    tab-size: 2; white-space: pre; caret-color: var(--cursor);
  }
  #code-editor::selection { background: #7b5ea755; }

  #resizer {
    width: 4px; background: transparent; cursor: col-resize;
    flex-shrink: 0; transition: background .15s; position: relative; z-index: 10;
  }
  #resizer:hover, #resizer.dragging { background: linear-gradient(180deg, var(--accent-bright), var(--pink)); }
  #resizer::after { content: ''; position: absolute; top: 0; bottom: 0; left: -3px; right: -3px; }

  #output-pane {
    flex: 1; display: flex; flex-direction: column;
    background: var(--bg); overflow: hidden; min-width: 100px;
  }
  #output-tabs {
    height: 36px; background: var(--bg2);
    display: flex; align-items: flex-end;
    padding-left: 8px; gap: 2px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .out-tab {
    height: 36px; padding: 0 16px;
    display: flex; align-items: center;
    cursor: pointer; font-size: 11px; color: var(--text-muted);
    user-select: none; border-bottom: 2px solid transparent;
    transition: color .15s; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
  }
  .out-tab.active { color: var(--accent-bright); border-bottom-color: var(--accent-bright); }
  .out-tab:hover:not(.active) { color: var(--text); }

  #run-btn {
    margin-left: auto; margin-right: 8px; align-self: center;
    background: linear-gradient(90deg, var(--accent) 0%, var(--pink) 100%);
    color: white; border: none; padding: 4px 14px; border-radius: 20px;
    cursor: pointer; font-size: 11px; font-family: inherit;
    display: flex; align-items: center; gap: 5px;
    transition: opacity .15s; letter-spacing: .5px; font-weight: 600;
  }
  #run-btn:hover { opacity: .85; }
  #run-btn:active { transform: scale(.97); }

  #output-body { flex: 1; overflow: hidden; position: relative; }
  #output-panel, #preview-panel { position: absolute; inset: 0; overflow: auto; }
  #preview-panel { display: none; }
  #preview-panel.active { display: block; }
  #output-panel.hidden { display: none; }

  #output-panel::-webkit-scrollbar, #preview-panel::-webkit-scrollbar { width: 8px; }
  #output-panel::-webkit-scrollbar-track { background: var(--bg2); }
  #output-panel::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

  #output-content {
    padding: 10px 14px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 12.5px; line-height: 1.7; white-space: pre-wrap; word-break: break-all; min-height: 100%;
  }
  .out-line { display: flex; gap: 8px; }
  .out-prefix { color: var(--text-dim); flex-shrink: 0; }
  .out-log { color: var(--text); }
  .out-error { color: var(--red); }
  .out-warn { color: var(--yellow); }
  .out-info { color: var(--cyan); }
  .out-success { color: var(--green); }

  #preview-frame { width: 100%; height: 100%; border: none; background: white; }

  #statusbar {
    height: 22px;
    background: linear-gradient(90deg, #3b1f6e 0%, #1a1a4e 40%, #0d2a4e 100%);
    display: flex; align-items: center;
    padding: 0 10px; gap: 14px; flex-shrink: 0; font-size: 11.5px;
    border-top: 1px solid #3a2a6a;
  }
  .sb-item {
    color: rgba(200,190,255,.75); display: flex; align-items: center;
    gap: 4px; cursor: default; padding: 0 4px; border-radius: 2px;
  }
  .sb-item:hover { background: rgba(255,255,255,.07); color: rgba(230,220,255,.95); }
  #sb-right { margin-left: auto; display: flex; gap: 10px; }
  .sb-lang { text-transform: uppercase; font-weight: 700; letter-spacing: .8px; color: var(--accent-bright) !important; }

  #minimap {
    width: 60px; background: #09091a;
    overflow: hidden; flex-shrink: 0;
    opacity: .65; position: relative; cursor: pointer;
    border-left: 1px solid var(--border);
  }
  #minimap canvas { display: block; }
  #minimap-viewport {
    position: absolute; left: 0; right: 0;
    background: rgba(167,139,250,.1); pointer-events: none;
    border-left: 1px solid var(--accent-bright)44;
  }

  #highlight-overlay {
    position: absolute; top: 0; left: 0; pointer-events: none;
    font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
    font-size: 13px; line-height: 1.5; padding: 8px 8px 8px 4px;
    white-space: pre; color: transparent;
  }
  .hl-match { background: rgba(251,191,36,.25); border-radius: 2px; outline: 1px solid rgba(251,191,36,.4); }
  .hl-match.current { background: rgba(244,114,182,.35); outline: 1px solid rgba(244,114,182,.7); }
</style>
</head>
<body>
<div id="app">
  <div id="main">

    <div id="activity">
      <div class="act-btn active" title="Explorer">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h6"/></svg>
      </div>
      <div class="act-btn" title="Search" onclick="showFind()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      </div>

    </div>

    <div id="editor-pane">
      <div id="editor-tabs">
        <div class="tab active" id="main-tab">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
          untitled
          <span class="close" onclick="closeTab(event)">×</span>
        </div>
      </div>

      <div id="find-bar">
        <input id="find-input" placeholder="Find" spellcheck="false" />
        <div class="find-opt" id="opt-case" title="Match Case" onclick="toggleFindOpt('case')">Aa</div>
        <div class="find-opt" id="opt-word" title="Match Whole Word" onclick="toggleFindOpt('word')">Ab|</div>
        <div class="find-opt" id="opt-regex" title="Use Regex" onclick="toggleFindOpt('regex')">.*</div>
        <span id="find-count">No Results</span>
        <div class="find-nav" title="Previous" onclick="findNav(-1)">↑</div>
        <div class="find-nav" title="Next" onclick="findNav(1)">↓</div>
        <div id="find-close" onclick="hideFind()">×</div>
      </div>

      <div id="editor-body">
        <div id="line-numbers"><div id="line-numbers-inner"></div></div>
        <div id="code-scroll">
          <div id="highlight-overlay"></div>
          <textarea id="code-editor" spellcheck="false" autocorrect="off" autocomplete="off" autocapitalize="off"></textarea>
        </div>
        <div id="minimap"><canvas id="minimap-canvas"></canvas><div id="minimap-viewport"></div></div>
      </div>
    </div>

    <div id="resizer"></div>

    <div id="output-pane">
      <div id="output-tabs">
        <div class="out-tab active" onclick="switchPanel('output')">Output</div>
        <div class="out-tab" onclick="switchPanel('preview')">Preview</div>
        <button id="run-btn" onclick="runCode()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
          Run
        </button>
      </div>
      <div id="output-body">
        <div id="output-panel"><div id="output-content"></div></div>
        <div id="preview-panel"><iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe></div>
      </div>
    </div>

  </div>

  <div id="statusbar">
    <div class="sb-item">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      0 errors
    </div>
    <div class="sb-item" id="sb-pos">Ln 1, Col 1</div>
    <div id="sb-right">
      <div class="sb-item" id="sb-lines">0 lines</div>
      <div class="sb-item" id="sb-chars">0 chars</div>
      <div class="sb-item sb-lang" id="sb-lang">TEXT</div>
      <div class="sb-item">UTF-8</div>
      <div class="sb-item">Spaces: 2</div>
    </div>
  </div>
</div>

<script>
const editor = document.getElementById('code-editor');
const codeScroll = document.getElementById('code-scroll');
const findBar = document.getElementById('find-bar');
const findInput = document.getElementById('find-input');
const findCount = document.getElementById('find-count');
const hlOverlay = document.getElementById('highlight-overlay');
const outputContent = document.getElementById('output-content');
const previewFrame = document.getElementById('preview-frame');
const sbPos = document.getElementById('sb-pos');
const sbLines = document.getElementById('sb-lines');
const sbChars = document.getElementById('sb-chars');
const sbLang = document.getElementById('sb-lang');
const minimapCanvas = document.getElementById('minimap-canvas');
const minimapViewport = document.getElementById('minimap-viewport');
const lineNumsInner = document.getElementById('line-numbers-inner');

let findMatches = [];
let findIndex = -1;
let findOpts = { case: false, word: false, regex: false };

function updateLineNumbers() {
  const lines = editor.value.split('\n');
  const count = lines.length;
  const existing = lineNumsInner.children.length;
  if (existing < count) {
    for (let i = existing; i < count; i++) {
      const d = document.createElement('span');
      d.className = 'ln';
      d.textContent = i + 1;
      lineNumsInner.appendChild(d);
    }
  } else if (existing > count) {
    while (lineNumsInner.children.length > count) lineNumsInner.removeChild(lineNumsInner.lastChild);
  }
  sbLines.textContent = count + ' line' + (count !== 1 ? 's' : '');
  sbChars.textContent = editor.value.length + ' char' + (editor.value.length !== 1 ? 's' : '');
  updateMinimap();
  if (findInput.value) runFind();
}

function syncScroll() {
  lineNumsInner.style.transform = `translateY(-${codeScroll.scrollTop}px)`;
  hlOverlay.scrollTop = codeScroll.scrollTop;
  hlOverlay.scrollLeft = codeScroll.scrollLeft;
  updateMinimapViewport();
}

codeScroll.addEventListener('scroll', syncScroll);

function updateCursor() {
  const val = editor.value;
  const pos = editor.selectionStart;
  const before = val.substring(0, pos);
  const lines = before.split('\n');
  const ln = lines.length;
  const col = lines[lines.length - 1].length + 1;
  sbPos.textContent = `Ln ${ln}, Col ${col}`;
}

function detectLang(code) {
  if (/^<!DOCTYPE|<html/i.test(code.trim())) return 'HTML';
  if (/\bmodule\b|\bexports\b|require\(/.test(code)) return 'JS';
  if (/\{[\s\S]*:[\s\S]*\}/.test(code) && !/</.test(code)) return 'CSS';
  if (/<svg/i.test(code)) return 'SVG';
  if (/WebAssembly|wasm/.test(code)) return 'WASM';
  if (/<script|function |const |let |var /.test(code)) return 'HTML/JS';
  return 'TEXT';
}

editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, end = editor.selectionEnd;
    const val = editor.value;
    editor.value = val.slice(0, s) + '  ' + val.slice(end);
    editor.selectionStart = editor.selectionEnd = s + 2;
    updateLineNumbers();
  }
  if (e.ctrlKey && e.key === 'f') { e.preventDefault(); showFind(); }
  if (e.key === 'Escape') hideFind();
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runCode(); }
});

editor.addEventListener('input', () => {
  updateLineNumbers();
  sbLang.textContent = detectLang(editor.value);
});
editor.addEventListener('click', updateCursor);
editor.addEventListener('keyup', updateCursor);

function showFind() {
  findBar.classList.add('visible');
  findInput.focus();
  findInput.select();
}

function hideFind() {
  findBar.classList.remove('visible');
  clearHighlights();
  editor.focus();
}

function toggleFindOpt(opt) {
  findOpts[opt] = !findOpts[opt];
  document.getElementById('opt-' + opt).classList.toggle('active', findOpts[opt]);
  runFind();
}

function runFind() {
  const query = findInput.value;
  clearHighlights();
  findMatches = [];
  if (!query) { findCount.textContent = 'No Results'; return; }
  const text = editor.value;
  let flags = 'g';
  if (!findOpts.case) flags += 'i';
  let pattern;
  try {
    if (findOpts.regex) {
      pattern = new RegExp(query, flags);
    } else {
      let escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      if (findOpts.word) escaped = '\\b' + escaped + '\\b';
      pattern = new RegExp(escaped, flags);
    }
  } catch { findCount.textContent = 'Invalid regex'; return; }
  let m;
  while ((m = pattern.exec(text)) !== null) {
    findMatches.push({ start: m.index, end: m.index + m[0].length });
    if (findMatches.length > 999) break;
  }
  if (findMatches.length === 0) {
    findCount.textContent = 'No Results';
    hlOverlay.innerHTML = '';
    return;
  }
  if (findIndex < 0 || findIndex >= findMatches.length) findIndex = 0;
  findCount.textContent = `${findIndex + 1} of ${findMatches.length}`;
  renderHighlights();
  scrollToMatch(findIndex);
}

function renderHighlights() {
  const text = editor.value;
  let html = '';
  let last = 0;
  findMatches.forEach((m, i) => {
    html += escapeHtml(text.slice(last, m.start));
    const cls = i === findIndex ? 'hl-match current' : 'hl-match';
    html += `<span class="${cls}">${escapeHtml(text.slice(m.start, m.end))}</span>`;
    last = m.end;
  });
  html += escapeHtml(text.slice(last));
  hlOverlay.innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function clearHighlights() {
  hlOverlay.innerHTML = '';
  findMatches = [];
  findIndex = -1;
}

function findNav(dir) {
  if (!findMatches.length) return;
  findIndex = (findIndex + dir + findMatches.length) % findMatches.length;
  findCount.textContent = `${findIndex + 1} of ${findMatches.length}`;
  renderHighlights();
  scrollToMatch(findIndex);
}

function scrollToMatch(idx) {
  const m = findMatches[idx];
  if (!m) return;
  const before = editor.value.slice(0, m.start);
  const lineNum = before.split('\n').length;
  const lineH = 13 * 1.5;
  const scrollTarget = (lineNum - 1) * lineH - (codeScroll.clientHeight / 2);
  codeScroll.scrollTop = Math.max(0, scrollTarget);
  syncScroll();
}

findInput.addEventListener('input', () => { findIndex = 0; runFind(); });
findInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.shiftKey ? findNav(-1) : findNav(1); }
  if (e.key === 'Escape') hideFind();
});

let activePanel = 'output';
function switchPanel(p) {
  activePanel = p;
  document.querySelectorAll('.out-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && p === 'output') || (i === 1 && p === 'preview'));
  });
  document.getElementById('output-panel').classList.toggle('hidden', p !== 'output');
  document.getElementById('preview-panel').classList.toggle('active', p === 'preview');
}

function runCode() {
  const code = editor.value;
  outputContent.innerHTML = '';
  const logs = [];
  const fakeConsole = {
    log: (...args) => logs.push({ type: 'log', msg: args.map(String).join(' ') }),
    error: (...args) => logs.push({ type: 'error', msg: args.map(String).join(' ') }),
    warn: (...args) => logs.push({ type: 'warn', msg: args.map(String).join(' ') }),
    info: (...args) => logs.push({ type: 'info', msg: args.map(String).join(' ') }),
  };
  addOutput({ type: 'info', msg: `running  (${new Date().toLocaleTimeString()})` });
  const isHTML = /<!DOCTYPE|<html/i.test(code.trim());
  if (isHTML) {
    switchPanel('preview');
    try {
      const blob = new Blob([code], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      previewFrame.src = url;
      setTimeout(() => URL.revokeObjectURL(url), 5000);
      addOutput({ type: 'success', msg: 'rendered in preview' });
    } catch (e) {
      addOutput({ type: 'error', msg: e.message });
    }
  } else {
    const scriptMatches = [...code.matchAll(/<script[^>]*>([\s\S]*?)<\/script>/gi)];
    let jsCode = scriptMatches.map(m => m[1]).join('\n');
    if (!jsCode) jsCode = code;
    try {
      const fn = new Function('console', jsCode);
      fn(fakeConsole);
      logs.forEach(addOutput);
      if (!logs.length) addOutput({ type: 'info', msg: '(no output)' });
      addOutput({ type: 'success', msg: 'done' });
    } catch (e) {
      logs.forEach(addOutput);
      addOutput({ type: 'error', msg: e.constructor.name + ': ' + e.message });
    }
    switchPanel('output');
  }
}

function addOutput(item) {
  const line = document.createElement('div');
  line.className = 'out-line';
  const prefix = document.createElement('span');
  prefix.className = 'out-prefix';
  prefix.textContent = '>  ';
  const msg = document.createElement('span');
  msg.className = 'out-' + item.type;
  msg.textContent = item.msg;
  line.appendChild(prefix);
  line.appendChild(msg);
  outputContent.appendChild(line);
  outputContent.scrollTop = outputContent.scrollHeight;
}

const resizer = document.getElementById('resizer');
const editorPane = document.getElementById('editor-pane');
let isResizing = false;

resizer.addEventListener('mousedown', e => {
  isResizing = true;
  resizer.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const main = document.getElementById('main');
  const rect = main.getBoundingClientRect();
  const activityW = 48;
  const resizerW = 4;
  const minEditor = 220;
  const maxEditor = rect.width - activityW - resizerW - 200;
  let newW = e.clientX - rect.left - activityW;
  newW = Math.max(minEditor, Math.min(maxEditor, newW));
  editorPane.style.width = newW + 'px';
  editorPane.style.flex = 'none';
});

document.addEventListener('mouseup', () => {
  if (!isResizing) return;
  isResizing = false;
  resizer.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  updateMinimap();
});

function updateMinimap() {
  const minimap = document.getElementById('minimap');
  const w = minimap.offsetWidth;
  const h = minimap.offsetHeight;
  if (w === 0 || h === 0) return;
  minimapCanvas.width = w;
  minimapCanvas.height = h;
  const ctx = minimapCanvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  const lines = editor.value.split('\n');
  const lineH = 2;
  lines.forEach((line, i) => {
    const y = i * (lineH + 0.5);
    if (y > h) return;
    const density = Math.min(line.length / 80, 1);
    const hue = 260 + density * 60;
    ctx.fillStyle = `hsla(${hue},70%,70%,${0.06 + density * 0.2})`;
    ctx.fillRect(0, y, Math.min(line.length * 0.6, w), lineH);
  });
  updateMinimapViewport();
}

function updateMinimapViewport() {
  const minimap = document.getElementById('minimap');
  const h = minimap.offsetHeight;
  const lines = editor.value.split('\n');
  const totalH = lines.length * 19.5;
  const viewH = codeScroll.clientHeight;
  const scrollTop = codeScroll.scrollTop;
  const ratio = h / totalH;
  const vpTop = scrollTop * ratio;
  const vpH = viewH * ratio;
  minimapViewport.style.top = vpTop + 'px';
  minimapViewport.style.height = Math.max(20, vpH) + 'px';
}

minimapCanvas.parentElement.addEventListener('click', e => {
  const minimap = document.getElementById('minimap');
  const rect = minimap.getBoundingClientRect();
  const relY = (e.clientY - rect.top) / minimap.offsetHeight;
  const lines = editor.value.split('\n');
  const totalH = lines.length * 19.5;
  codeScroll.scrollTop = relY * totalH - codeScroll.clientHeight / 2;
});

function closeTab(e) {
  e.stopPropagation();
  if (confirm('Clear editor?')) {
    editor.value = '';
    updateLineNumbers();
    sbLang.textContent = 'TEXT';
  }
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'f') { e.preventDefault(); showFind(); }
  if (e.key === 'Escape' && findBar.classList.contains('visible')) hideFind();
});

updateLineNumbers();
sbLang.textContent = detectLang(editor.value);
updateCursor();
setTimeout(updateMinimap, 100);

const ro = new ResizeObserver(updateMinimap);
ro.observe(document.getElementById('minimap'));
ro.observe(codeScroll);
</script>
</body>
