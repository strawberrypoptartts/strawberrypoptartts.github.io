<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Emotion Camera</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    display:flex;
    gap:30px;
    align-items:center;
}

.camera-box{
    position:relative;
}

video{
    width:640px;
    height:480px;
    border:4px solid white;
    border-radius:12px;
    object-fit:cover;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

.emoji-panel{
    text-align:center;
}

#emoji{
    font-size:120px;
}

#mood{
    font-size:24px;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="container">
    <div class="camera-box">
        <video id="video" autoplay muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="emoji-panel">
        <div id="emoji">😐</div>
        <div id="mood">Neutral</div>
    </div>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<script>
const video = document.getElementById("video");
const emoji = document.getElementById("emoji");
const mood = document.getElementById("mood");

const emotionMap = {
    happy: "😄",
    sad: "😢",
    angry: "😠",
    surprised: "😲",
    fearful: "😨",
    disgusted: "🤢",
    neutral: "😐"
};

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: true
    });

    video.srcObject = stream;
}

async function loadModels() {
    const MODEL_URL =
        "https://justadudewhohacks.github.io/face-api.js/models";

    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
}

video.addEventListener("play", () => {

    const canvas = document.getElementById("overlay");

    const displaySize = {
        width: video.width,
        height: video.height
    };

    faceapi.matchDimensions(canvas, displaySize);

    setInterval(async () => {

        const detections =
            await faceapi
            .detectSingleFace(
                video,
                new faceapi.TinyFaceDetectorOptions()
            )
            .withFaceExpressions();

        const ctx = canvas.getContext("2d");
        ctx.clearRect(0,0,canvas.width,canvas.height);

        if (detections) {

            const expressions = detections.expressions;

            let strongestEmotion = "neutral";
            let highestValue = 0;

            for (const emotion in expressions) {
                if (expressions[emotion] > highestValue) {
                    highestValue = expressions[emotion];
                    strongestEmotion = emotion;
                }
            }

            emoji.textContent =
                emotionMap[strongestEmotion] || "😐";

            mood.textContent =
                strongestEmotion.charAt(0).toUpperCase() +
                strongestEmotion.slice(1);
        }

    }, 300);

});

(async () => {
    await loadModels();
    await startCamera();
})();
</script>

</body>
</html>
